[project]
# List of environment variables to be provided by each user to use the app.
user_env = []

# Whether to persist user environment variables (API keys) to the database
persist_user_env = false

# Whether to mask user environment variables (API keys) in the UI with password type
mask_user_env = false

# Duration (in seconds) during which the session is saved when the connection is lost
session_timeout = 3600

# Duration (in seconds) of the user session expiry
user_session_timeout = 1296000

# Enable third parties caching (e.g., LangChain cache)
cache = false

# Authorized origins
allow_origins = ["*"]

[features]
# Process and display HTML in messages. This can be a security risk (see https://stackoverflow.com/questions/19603097/why-is-it-dangerous-to-render-user-generated-html-or-javascript)
unsafe_allow_html = false

# Process and display mathematical expressions. This can clash with "$" characters in messages.
latex = false

# Autoscroll new user messages at the top of the window
user_message_autoscroll = true

# Autoscroll assistant messages as they stream
assistant_message_autoscroll = true

# Automatically tag threads with the current chat profile (if a chat profile is used)
auto_tag_thread = true

# Allow users to edit their own messages
edit_message = true

# Allow users to share threads (backend + UI). Requires an app-defined on_shared_thread_view callback.
allow_thread_sharing = false

# Enable favorite messages (prompt templates)
favorites = false

# Authorize users to spontaneously upload files with messages
[features.spontaneous_file_upload]
    enabled = false
    # Define accepted file types using MIME types
    # Examples:
    # 1. For specific file types:
    #    accept = ["image/jpeg", "image/png", "application/pdf"]
    # 2. For all files of certain type:
    #    accept = ["image/*", "audio/*", "video/*"]
    # 3. For specific file extensions:
    #    accept = { "application/octet-stream" = [".xyz", ".pdb"] }
    # Note: Using "*/*" is not recommended as it may cause browser warnings
    accept = { "image/*" = [], "application/pdf" = [], "text/*" = [], "application/json" = [], "application/xml" = [], "application/javascript" = [], "application/x-sh" = [], "application/x-shellscript" = [], "application/octet-stream" = [".py", ".js", ".ts", ".html", ".css", ".sh", ".bash", ".zsh", ".yaml", ".yml", ".toml", ".xml", ".md", ".go", ".rs", ".rb", ".java", ".c", ".cpp", ".h", ".hpp", ".vue", ".svelte", ".jsx", ".tsx", ".scss", ".sass", ".json", ".sql", ".kt", ".swift", ".lua", ".r", ".env", ".ini", ".cfg", ".conf", ".csv", ".log"] }
    max_files = 20
    max_size_mb = 500

[features.audio]
    enabled = false
    sample_rate = 24000

[features.mcp]
    # Enable Model Context Protocol (MCP) features
    enabled = false

[features.mcp.sse]
    enabled = false

[features.mcp.streamable-http]
    enabled = false

[features.mcp.stdio]
    enabled = false
    # Only the executables in the allow list can be used for MCP stdio server.
    # Only need the base name of the executable, e.g. "npx", not "/usr/bin/npx".
    # Please don't comment this line for now, we need it to parse the executable name.
    allowed_executables = [ "npx", "uvx" ]

[UI]
# Name of the assistant.
name = "Chat Assistant"
default_theme = "dark"

# layout = "wide"

default_sidebar_state = "open"

# Skip confirmation when using the header/sidebar New Chat control
confirm_new_chat = false

# Description of the assistant. This is used for HTML tags.
# description = ""

# Chain of Thought (CoT) display mode. Can be "hidden", "tool_call" or "full".
cot = "hidden"

# Specify additional attributes for a custom CSS file
custom_css = "/public/custom.css"

# The style of alert boxes. Can be "classic" or "modern".
alert_style = "modern"

# Specify additional attributes for custom JS file
# custom_js_attributes = "async type = \"module\""

custom_js = "/public/custom.js"

# Custom login page image, relative to public directory or external URL
# login_page_image = "/public/custom-background.jpg"

# Custom login page image filter (Tailwind internal filters, no dark/light variants)
# login_page_image_filter = "brightness-50 grayscale"
# login_page_image_dark_filter = "contrast-200 blur-sm"

# Specify a custom meta url for link previews (og:url).
# custom_meta_url = "https://example.com"

# Specify a custom meta image url.
# custom_meta_image_url = "https://chainlit-cloud.s3.eu-west-3.amazonaws.com/logo/chainlit_banner.png"

# Load assistant logo directly from URL (welcome screen; theme logos in public/).
logo_file_url = "/public/logo_dark.png"

# Load assistant avatar image directly from URL.
default_avatar_file_url = ""

# Specify a custom build directory for the frontend.
# This can be used to customize the frontend code.
# Be careful: If this is a relative path, it should not start with a slash.
# custom_build = "./public/build"

